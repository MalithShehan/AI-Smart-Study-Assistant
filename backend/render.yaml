# render.yaml — Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-study-assistant-api
    runtime: node
    region: singapore   # change to closest region: oregon, frankfurt, ohio, virginia
    plan: starter       # free | starter | standard | pro

    # Build
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js

    # Health check
    healthCheckPath: /health

    # Auto-deploy on push to main
    autoDeploy: true
    branch: main

    # Environment variables (set secrets in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_SWAGGER
        value: "false"
      # Secrets — set these in the Render dashboard, NOT here
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CORS_ORIGIN
        sync: false
